services:

  # ── Next.js Anwendung ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hr-management-app
    restart: unless-stopped
    ports:
      # Port 3000 ist im Netzwerk erreichbar (z.B. http://192.168.1.100:3000)
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://hruser:${POSTGRES_PASSWORD}@db:5432/hr_management?schema=public"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL}"
      PRISMA_FIELD_ENCRYPTION_KEY: "${PRISMA_FIELD_ENCRYPTION_KEY}"
      NODE_ENV: "production"
      # Optional: WooCommerce
      WOOCOMMERCE_URL: "${WOOCOMMERCE_URL:-}"
      WOOCOMMERCE_CONSUMER_KEY: "${WOOCOMMERCE_CONSUMER_KEY:-}"
      WOOCOMMERCE_CONSUMER_SECRET: "${WOOCOMMERCE_CONSUMER_SECRET:-}"
    volumes:
      # Hochgeladene Dateien bleiben bei Container-Neustart erhalten
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hr-internal
    security_opt:
      # Container darf keine neuen Privilegien erlangen
      - no-new-privileges:true
    cap_drop:
      # Alle Linux-Capabilities entfernen – App braucht keine davon
      - ALL
    cap_add:
      # Nur Netzwerk-Binding für Port 3000 wieder erlauben
      - NET_BIND_SERVICE

  # ── PostgreSQL Datenbank ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hr_management
      POSTGRES_USER: hruser
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      # Datenbankdaten bleiben dauerhaft erhalten
      - postgres-data:/var/lib/postgresql/data
    # KEIN ports-Mapping → Datenbank ist NUR intern im Docker-Netzwerk erreichbar
    networks:
      - hr-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hruser -d hr_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # PostgreSQL braucht diese Capability für seine internen Prozesse
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
      - CHOWN

# ── Persistente Volumes ────────────────────────────────────────────────────
volumes:
  postgres-data:
    name: hr_postgres_data
  uploads:
    name: hr_uploads

# ── Internes Netzwerk (isoliert vom Rest des Servers) ─────────────────────
networks:
  hr-internal:
    name: hr-internal-network
    driver: bridge
    internal: false   # false = App-Container darf Internet (für npm/Prisma beim Build)
